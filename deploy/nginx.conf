# @author Padmin D. Curtis (AI Partner OS3.0) for Fabio Cherici
# @version 1.0.0 (FlorenceEGI — La Bottega)
# @date 2026-04-12
# @purpose Nginx vhost per la-bottega.florenceegi.com (ALB fa SSL termination)
#
# Installazione su EC2:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/la-bottega.florenceegi.com
#   sudo ln -sf /etc/nginx/sites-available/la-bottega.florenceegi.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name la-bottega.florenceegi.com;
    root /home/forge/la-bottega.florenceegi.com/laravel_backend/public;
    index index.php;

    location = /health { return 200 'OK'; add_header Content-Type text/plain; }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* { deny all; }
}

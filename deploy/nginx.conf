# @author Padmin D. Curtis (AI Partner OS3.0) for Fabio Cherici
# @version 1.0.0 (FlorenceEGI — La Bottega)
# @date 2026-04-12
# @purpose Nginx vhost per la-bottega.florenceegi.com
#
# Installazione su EC2:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/la-bottega.florenceegi.com
#   sudo ln -s /etc/nginx/sites-available/la-bottega.florenceegi.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name la-bottega.florenceegi.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name la-bottega.florenceegi.com;
    root /home/forge/la-bottega.florenceegi.com/laravel_backend/public;

    index index.php;

    charset utf-8;

    # SSL — Let's Encrypt wildcard (gestito da Forge/certbot)
    ssl_certificate /etc/nginx/ssl/florenceegi.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/florenceegi.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Logs
    access_log /var/log/nginx/la-bottega.florenceegi.com-access.log;
    error_log /var/log/nginx/la-bottega.florenceegi.com-error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Max upload
    client_max_body_size 20M;

    # Vite build assets (cache aggressive)
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Static assets
    location ~* \.(jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Laravel — SPA fallback
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_buffering off;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
